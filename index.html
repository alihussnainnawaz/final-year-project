<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Frontend Generator</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 20 L18 26 L28 14" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <h1>AI Frontend Generator</h1>
            </div>
            <p class="subtitle">Transform ideas into structured, production-ready code</p>
        </header>

        <main class="main-content">
            <!-- Step 1: Input -->
            <section class="step active" id="step-input">
                <div class="step-header">
                    <span class="step-number">1</span>
                    <h2>Describe Your Vision</h2>
                </div>
                <div class="input-container">
                    <textarea 
                        id="userPrompt" 
                        placeholder="Describe the website or app you want to build... (e.g., 'a landing page for a coffee shop with menu and contact form')"
                        rows="6"
                    ></textarea>
                    <button id="startBtn" class="btn btn-primary">
                        <span>Start Generation</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M5 10h10M10 5l5 5-5 5" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Step 2: Refinement -->
            <section class="step" id="step-refinement">
                <div class="step-header">
                    <span class="step-number">2</span>
                    <h2>Prompt Refinement</h2>
                </div>
                <div class="process-card">
                    <div class="loader" id="refinementLoader"></div>
                    <div class="process-content" id="refinementContent"></div>
                </div>
            </section>

            <!-- Step 3: Debate -->
            <section class="step" id="step-debate">
                <div class="step-header">
                    <span class="step-number">3</span>
                    <h2>AI Debate: Finding the Optimal Solution</h2>
                </div>
                <div class="debate-container">
                    <div class="debate-agent optimist">
                        <div class="agent-header">
                            <div class="agent-avatar optimist-avatar">😊</div>
                            <h3>Optimist Agent</h3>
                        </div>
                        <div class="agent-content" id="optimistContent"></div>
                    </div>
                    <div class="debate-agent pessimist">
                        <div class="agent-header">
                            <div class="agent-avatar pessimist-avatar">🤔</div>
                            <h3>Pessimist Agent</h3>
                        </div>
                        <div class="agent-content" id="pessimistContent"></div>
                    </div>
                </div>
                <div class="debate-conclusion" id="debateConclusion"></div>
            </section>

            <!-- Step 4: Code Generation -->
            <section class="step" id="step-generation">
                <div class="step-header">
                    <span class="step-number">4</span>
                    <h2>Code Generation</h2>
                </div>
                <div class="process-card">
                    <div class="loader" id="generationLoader"></div>
                    <div class="process-content" id="generationContent"></div>
                    <div class="file-structure" id="fileStructure"></div>
                </div>
            </section>

            <!-- Step 5: Preview & Download -->
            <section class="step" id="step-preview">
                <div class="step-header">
                    <span class="step-number">5</span>
                    <h2>Preview & Download</h2>
                </div>
                <div class="preview-controls">
                    <button id="downloadBtn" class="btn btn-success">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 3v10m0 0l-4-4m4 4l4-4M3 17h14" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Download ZIP</span>
                    </button>
                    <button id="restartBtn" class="btn btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 10a6 6 0 1 1 12 0 6 6 0 0 1-12 0z" stroke="currentColor" stroke-width="2"/>
                            <path d="M10 6V4M10 16v-2" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Start Over</span>
                    </button>
                </div>
                <div class="preview-container">
                    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/promptRefiner.js"></script>
    <script src="js/debateEngine.js"></script>
    <script src="js/codeGenerator.js"></script>
    <script src="js/fileManager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
